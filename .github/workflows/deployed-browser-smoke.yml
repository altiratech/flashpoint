name: Deployed Browser Smoke

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Deployed Flashpoint web URL"
        required: false
        default: "https://escalation-web.pages.dev"
        type: string
      response_strategy:
        description: "Browser smoke response strategy"
        required: false
        default: "default"
        type: choice
        options:
          - default
          - varied
          - public-econ
      seed:
        description: "Optional deterministic smoke seed"
        required: false
        default: ""
        type: string
      verify_telemetry:
        description: "Verify fresh remote D1 telemetry after the browser smoke"
        required: false
        default: true
        type: boolean
      telemetry_scenario_id:
        description: "Scenario id filter for post-smoke telemetry verification"
        required: false
        default: "northern_strait_black_swan"
        type: string
  schedule:
    - cron: "37 14 * * 1"

concurrency:
  group: flashpoint-deployed-browser-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PLAYTEST_WEB_URL: ${{ github.event.inputs.web_url || vars.FLASHPOINT_VERIFY_WEB_URL || 'https://escalation-web.pages.dev' }}
      PLAYTEST_RESPONSE_STRATEGY: ${{ github.event.inputs.response_strategy || 'default' }}
      PLAYTEST_SEED: ${{ github.event.inputs.seed || (github.event.inputs.response_strategy == 'public-econ' && 'public-econ-2' || '') }}
      PLAYTEST_OUTPUT_DIR: output/playwright-deployed
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VERIFY_TELEMETRY_LOOKBACK_HOURS: "1"
      VERIFY_TELEMETRY_SCENARIO_ID: ${{ github.event.inputs.telemetry_scenario_id || 'northern_strait_black_swan' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Mark telemetry verification window
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.verify_telemetry }}
        run: echo "VERIFY_TELEMETRY_NOT_BEFORE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Run deployed browser smoke
        run: npm run smoke:browser

      - name: Wait for telemetry writes
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.verify_telemetry }}
        run: sleep 5

      - name: Verify fresh remote telemetry
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.verify_telemetry }}
        run: npm run verify:telemetry:remote

      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: flashpoint-deployed-browser-smoke-${{ github.run_id }}
          path: output/playwright-deployed/
          if-no-files-found: ignore
          retention-days: 14
