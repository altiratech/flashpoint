name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: escalation-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run lint

      - name: Phase 1 quality gate
        run: npm run ci:phase1

  deploy_api:
    runs-on: ubuntu-latest
    needs: quality_gate
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply remote D1 migrations
        run: npm run db:migrate:remote

      - name: Verify remote D1 schema
        run: npm run verify:d1:schema:remote

      - name: Deploy API Worker
        run: npm run deploy --workspace @wargames/api

  deploy_web:
    runs-on: ubuntu-latest
    needs: quality_gate
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'escalation-web' }}
      CLOUDFLARE_PAGES_BRANCH: ${{ vars.CLOUDFLARE_PAGES_BRANCH || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        env:
          VITE_API_BASE_URL: ${{ vars.FLASHPOINT_API_BASE_URL || 'https://escalation-api.rjameson.workers.dev' }}
        run: npm run build --workspace @wargames/web

      - name: Deploy web to Cloudflare Pages
        run: npx wrangler pages deploy apps/web/dist --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$CLOUDFLARE_PAGES_BRANCH"

  verify_deploy:
    runs-on: ubuntu-latest
    needs: [deploy_api, deploy_web]
    env:
      VERIFY_API_ORIGIN: ${{ vars.FLASHPOINT_VERIFY_API_ORIGIN || 'https://escalation-api.rjameson.workers.dev' }}
      VERIFY_WEB_URL: ${{ vars.FLASHPOINT_VERIFY_WEB_URL || 'https://escalation-web.pages.dev' }}
      VERIFY_SCENARIO_ID: ${{ vars.FLASHPOINT_VERIFY_SCENARIO_ID || 'northern_strait_black_swan' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify production deployment
        run: |
          mkdir -p output/deploy-verification
          set -o pipefail
          VERIFY_DEPLOY_EVIDENCE_PATH=output/deploy-verification/evidence.json ./scripts/verify-deploy.sh 2>&1 | tee output/deploy-verification/verify-deploy.log

      - name: Upload deployment verification evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: flashpoint-deploy-verification-${{ github.run_id }}
          path: output/deploy-verification/
          if-no-files-found: warn
          retention-days: 14
