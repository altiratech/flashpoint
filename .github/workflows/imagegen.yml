name: Flashpoint Image Generation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Generation mode"
        required: true
        default: "generate"
        type: choice
        options:
          - "generate"
          - "edit"
      prompt:
        description: "Primary image prompt"
        required: true
        type: string
      out_name:
        description: "Base output filename (no extension)"
        required: true
        default: "flashpoint-scene"
        type: string
      variants:
        description: "How many variants to generate"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
      size:
        description: "Image size"
        required: true
        default: "1536x1024"
        type: choice
        options:
          - "1536x1024"
          - "1024x1024"
          - "1024x1536"
      quality:
        description: "Generation quality"
        required: true
        default: "high"
        type: choice
        options:
          - "auto"
          - "low"
          - "medium"
          - "high"
      use_case:
        description: "Use-case label for prompt augmentation"
        required: false
        default: "photorealistic-natural"
        type: string
      reference_images:
        description: "Edit mode only: repo-relative paths or public HTTPS URLs, separated by commas or new lines"
        required: false
        type: string
      mask_path:
        description: "Edit mode only: repo-relative PNG mask path"
        required: false
        type: string
      input_fidelity:
        description: "Edit mode only: how closely to follow the reference image(s)"
        required: false
        default: "high"
        type: choice
        options:
          - "low"
          - "high"
      scene:
        description: "Scene/background"
        required: false
        type: string
      subject:
        description: "Subject"
        required: false
        type: string
      style:
        description: "Style/medium"
        required: false
        default: "wire-service editorial photojournalism"
        type: string
      composition:
        description: "Composition/framing"
        required: false
        default: "telephoto news photography from nearby support craft, slightly imperfect framing, grounded realism"
        type: string
      lighting:
        description: "Lighting/mood"
        required: false
        default: "natural available light, maritime haze, restrained documentary tension"
        type: string
      constraints:
        description: "Required constraints"
        required: false
        default: "modern realistic vessels, credible uniforms and equipment, official service markings may be visible, no watermark"
        type: string
      negative:
        description: "Avoid"
        required: false
        default: "painterly finish, animated look, over-processed HDR, movie-poster lighting, hyper-detailed skin, glossy sci-fi styling, black and white imagery, anachronistic ships, fake UI overlays"
        type: string
      dry_run:
        description: "Validate payload without calling the API"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install image generation dependencies
        run: python -m pip install --upgrade pip openai pillow

      - name: Validate secret presence
        if: ${{ !inputs.dry_run }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing OPENAI_API_KEY repo secret."
            echo "Add it in GitHub: Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Generate images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output/imagegen
          mkdir -p tmp/imagegen/workflow-inputs
          preview_file="output/imagegen/request-preview.json"

          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          parse_list() {
            local raw="$1"
            local -n parsed_ref="$2"
            parsed_ref=()
            while IFS= read -r line; do
              line="$(trim "$line")"
              [ -z "$line" ] && continue
              parsed_ref+=("$line")
            done < <(printf '%s\n' "$raw" | tr ',' '\n')
          }

          materialize_reference() {
            local ref="$1"
            local index="$2"
            local trimmed
            trimmed="$(trim "$ref")"
            if [[ "$trimmed" =~ ^https?:// ]]; then
              local ext="${trimmed##*.}"
              if [[ "$ext" == "$trimmed" ]] || [[ "$ext" == *"/"* ]] || [[ "$ext" == *"?"* ]]; then
                ext="png"
              fi
              local downloaded="tmp/imagegen/workflow-inputs/reference-${index}.${ext}"
              echo "Downloading reference ${index}: ${trimmed}" >&2
              if ! curl -fsSL "$trimmed" -o "$downloaded"; then
                echo "Failed to download reference image: ${trimmed}" >&2
                exit 1
              fi
              printf '%s' "$downloaded"
              return 0
            fi
            if [ ! -f "$trimmed" ]; then
              echo "Missing reference image: $trimmed" >&2
              exit 1
            fi
            printf '%s' "$trimmed"
          }

          mode="${{ inputs.mode }}"
          reference_inputs=()
          reference_images=()
          parse_list "${{ inputs.reference_images }}" reference_inputs
          for i in "${!reference_inputs[@]}"; do
            reference_images+=("$(materialize_reference "${reference_inputs[$i]}" "$((i + 1))")")
          done

          if [ "$mode" = "edit" ]; then
            if [ "${#reference_images[@]}" -eq 0 ]; then
              echo "Edit mode requires at least one reference image path or URL." >&2
              exit 1
            fi
            cmd=(
              python scripts/image_gen.py edit
              --prompt "${{ inputs.prompt }}"
              --out "output/imagegen/${{ inputs.out_name }}.png"
              --size "${{ inputs.size }}"
              --quality "${{ inputs.quality }}"
              --n "${{ inputs.variants }}"
              --use-case "${{ inputs.use_case }}"
              --style "${{ inputs.style }}"
              --composition "${{ inputs.composition }}"
              --lighting "${{ inputs.lighting }}"
              --constraints "${{ inputs.constraints }}"
              --negative "${{ inputs.negative }}"
              --input-fidelity "${{ inputs.input_fidelity }}"
              --downscale-max-dim 1024
              --force
            )
            for ref_path in "${reference_images[@]}"; do
              cmd+=(--image "$ref_path")
            done
            if [ -n "${{ inputs.mask_path }}" ]; then
              if [ ! -f "${{ inputs.mask_path }}" ]; then
                echo "Missing mask file: ${{ inputs.mask_path }}" >&2
                exit 1
              fi
              cmd+=(--mask "${{ inputs.mask_path }}")
            fi
          else
            cmd=(
              python scripts/image_gen.py generate
              --prompt "${{ inputs.prompt }}"
              --out "output/imagegen/${{ inputs.out_name }}.png"
              --size "${{ inputs.size }}"
              --quality "${{ inputs.quality }}"
              --n "${{ inputs.variants }}"
              --use-case "${{ inputs.use_case }}"
              --style "${{ inputs.style }}"
              --composition "${{ inputs.composition }}"
              --lighting "${{ inputs.lighting }}"
              --constraints "${{ inputs.constraints }}"
              --negative "${{ inputs.negative }}"
              --downscale-max-dim 1024
              --force
            )
          fi

          if [ -n "${{ inputs.scene }}" ]; then
            cmd+=(--scene "${{ inputs.scene }}")
          fi

          if [ -n "${{ inputs.subject }}" ]; then
            cmd+=(--subject "${{ inputs.subject }}")
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            cmd+=(--dry-run)
          fi

          printf 'Running:'
          printf ' %q' "${cmd[@]}"
          printf '\n'
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            "${cmd[@]}" | tee "$preview_file"
          else
            "${cmd[@]}"
          fi

      - name: Upload generated images
        uses: actions/upload-artifact@v7
        with:
          name: flashpoint-imagegen-${{ github.run_id }}
          path: output/imagegen/
          if-no-files-found: error
